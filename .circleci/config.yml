version: 2.1

orbs:
  aws-s3: circleci/aws-s3@4.0.0

jobs:
  build:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run: npm install
      - run: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - build

  deploy:
    docker:
      - image: cimg/node:lts
    steps:
      - attach_workspace:
          at: .
      - aws-s3/sync:
          from: build
          to: 's3://$AWS_S3_BUCKET_NAME'
          arguments: '--acl public-read --delete'
          overwrite: true

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build