version: 2.1

orbs:
  node: circleci/node@5.1.0
  aws-cli: circleci/aws-cli@4.1.2

jobs:
  build:
    docker:
      - image: cimg/node:21.2.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Build React App
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - build    

  deploy:
    docker:
      - image: cimg/node:21.2.0
    steps:
    - attach_workspace:
        at: .
    - aws-cli/setup
    - run:
        name: List root dir
        command: | 
          ls la .
    - run:
        name: Deploy to AWS S3
        command: | 
          aws s3 sync ./build s3://$AWS_S3_BUCKET_NAME/react-app --acl public-read --delete

workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
