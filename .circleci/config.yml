version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.4.0

    steps:
      - checkout

      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}

      - run:
          name: Install Dependencies
          command: npm install

      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

      - run:
          name: Build React App
          command: npm run build

      - save_cache:
          key: app-build-cache-{{ .Branch }}
          paths:
            - ./build

      - run:
          name: Run tests
          command: npm run test

      - store_test_results:
          path: test-results

  deploy:
    docker:
      - image: google/cloud-sdk:latest

    steps:
      - checkout

      - run:
          name: Configure Google Cloud SDK
          command: echo $GCLOUD_SERVICE_KEY | base64 --decode --ignore-garbage > ${HOME}/gcloud-service-key.json

      - run:
          name: Authenticate with Google Cloud
          command: gcloud auth activate-service-account --key-file=${HOME}/gcloud-service-key.json

      - run:
          name: Deploy to Google Cloud
          command: gcloud app deploy --project $PROJECT_ID

workflows:
  build_and_test:
    jobs:
      - build
      - deploy:
          requires:
            - build
